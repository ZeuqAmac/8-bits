<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MOREZOMBI: La Catedral Maldita</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="arcade">
    <div id="marquee">
      <span class="m-red">MOREZOMBI</span>
      <span class="m-yel">: LA CATEDRAL MALDITA</span>
    </div>

    <div id="screen-wrap">
      <canvas id="game" width="512" height="384"></canvas>
      <div id="scanlines"></div>
      <button class="t-btn t-start" data-key="enter" aria-hidden="true">START</button>
    </div>

    <div id="touch-controls" aria-hidden="true">
      <div class="t-dpad">
        <button class="t-btn t-left"  data-key="arrowleft">&#9664;</button>
        <button class="t-btn t-right" data-key="arrowright">&#9654;</button>
      </div>
      <div class="t-actions">
        <button class="t-btn t-throw" data-key="c">C</button>
        <button class="t-btn t-jump"  data-key="z">B</button>
        <button class="t-btn t-punch" data-key="x">A</button>
      </div>
    </div>

    <div id="controls">
      <div class="ctrl-block">
        <div class="ctrl-title">MOVER</div>
        <div class="keys">
          <kbd>&larr;</kbd><kbd>&rarr;</kbd>
        </div>
      </div>
      <div class="ctrl-block">
        <div class="ctrl-title">SALTAR</div>
        <div class="keys"><kbd>Z</kbd></div>
      </div>
      <div class="ctrl-block">
        <div class="ctrl-title">GOLPE</div>
        <div class="keys"><kbd>X</kbd></div>
      </div>
      <div class="ctrl-block">
        <div class="ctrl-title">DECRETO</div>
        <div class="keys"><kbd>C</kbd></div>
      </div>
      <div class="ctrl-block">
        <div class="ctrl-title">START</div>
        <div class="keys"><kbd>ENTER</kbd></div>
      </div>
    </div>

    <div id="legend">INSERT COIN &mdash; 1993 MEXI-PIX</div>
  </div>

  <script src="game.js"></script>
</body>
</html>
